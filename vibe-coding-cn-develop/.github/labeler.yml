# .github/labeler.yml
# 为 actions/labeler 定义标签规则

# 文档相关的标签
documentation:
  - changed-files:
    - any-glob-to-any-file:
      - 'README.md'
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - 'LICENSE'
      - '.github/**/*.md'
      - 'assets/README.md'
      - 'assets/AGENTS.md'
      - 'tools/config/**/*.md'
      - 'docs/**/*.md'
      - 'prompts/**/*.md'
      - 'skills/**/*.md'
      - 'tools/external/**/*.md'

# CI/CD 工作流相关的标签
cicd:
  - changed-files:
    - any-glob-to-any-file: '.github/workflows/*'

# 提示词相关的标签
prompt:
  - changed-files:
    - any-glob-to-any-file: 'prompts/**/*.md'

# 外部工具/依赖相关的标签
repos:
  - changed-files:
    - any-glob-to-any-file: 'tools/external/**'
